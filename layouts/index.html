{{ define "main" }}
<div class="home-intro">
  <div class="home-profile">
    {{ with .Site.Params.profileImage }}
    <img class="profile-photo" src="/{{ . }}" alt="{{ $.Site.Params.author.name }}" />
    {{ end }}
    {{ with .Site.Params.social }}
    <div class="social-links">
      {{ with .email }}<a class="social-pill" href="mailto:{{ . }}">email</a>{{ end }}
      {{ with .linkedin }}<a class="social-pill" href="{{ . }}" target="_blank" rel="noopener">linkedin</a>{{ end }}
      {{ with .github }}<a class="social-pill" href="{{ . }}" target="_blank" rel="noopener">github</a>{{ end }}
      {{ with .orcid }}<a class="social-pill" href="{{ . }}" target="_blank" rel="noopener">orcid</a>{{ end }}
    </div>
    {{ end }}
  </div>
  <div class="home-content">
    {{ .Content }}
  </div>
</div>
{{ end }}
