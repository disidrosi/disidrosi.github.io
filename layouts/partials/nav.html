{{- $homeActive := eq .RelPermalink "/" -}}
<a href="/" {{- if $homeActive }}class="active"{{ end -}}>Home</a>
{{- range .Site.Menus.main.ByWeight }}
  <a
    href="{{ .URL }}"
    {{- if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
      class="active"
    {{- end -}}
    >{{ .Name }}</a
  >
{{- end }}
<a href="{{ absURL "index.xml" }}">RSS</a>
{{- /* EOF */ -}}
