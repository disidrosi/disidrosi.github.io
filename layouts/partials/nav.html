{{- $homeActive := eq .RelPermalink "/" -}}
<ul>
  <li><a href="/" {{- if $homeActive }}class="active"{{ end -}}>Home</a></li>
  {{- range .Site.Menus.main.ByWeight }}
    <li>
      <a
        href="{{ .URL }}"
        {{- if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
          class="active"
        {{- end -}}
        >{{ .Name }}</a
      >
    </li>
  {{- end }}
  <li><a href="{{ absURL "index.xml" }}">RSS</a></li>
</ul>
