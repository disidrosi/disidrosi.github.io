{{ with .Site.Params.favicon }}
  <link rel="icon" type="image/x-icon" href="{{ absURL . }}" />
{{ end }}
<link
  rel="icon"
  type="image/png"
  sizes="32x32"
  href="{{ "favicon-32x32.png" | absURL }}"
/>
<link
  rel="icon"
  type="image/png"
  sizes="16x16"
  href="{{ "favicon-16x16.png" | absURL }}"
/>
<link
  rel="apple-touch-icon"
  sizes="180x180"
  href="{{ "apple-touch-icon.png" | absURL }}"
/>
