<a class="skip-link" href="#main-content">{{ i18n "skip-link" }}</a>

{{ if .IsHome }}
  <a href="{{ relURL .Site.Home.RelPermalink }}" class="title">
    <h1>{{ .Site.Title }}</h1>
  </a>
{{ else }}
  <a href="{{ relURL .Site.Home.RelPermalink }}" class="title">
    <p>{{ .Site.Title }}</p>
  </a>
{{ end }}
<nav aria-label="Main navigation">{{- partial "nav.html" . -}}</nav>
