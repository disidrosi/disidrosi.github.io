<div class="post-meta">
  <span class="post-meta-item">
    <span class="post-meta-label">Published:</span>
    <time datetime="{{ .Date.Format "2006-01-02" }}">
      {{ partial "format-date.html" .Date }}
    </time>
  </span>
  {{ if ne .Lastmod .Date }}
    <span class="post-meta-item">
      <span class="post-meta-label">Modified:</span>
      <time datetime="{{ .Lastmod.Format "2006-01-02" }}">
        {{ partial "format-date.html" .Lastmod }}
      </time>
    </span>
  {{ end }}
  {{ with .Params.author }}
    <span class="post-meta-item">
      <span class="post-meta-label">Author:</span>
      {{ . }}
    </span>
  {{ end }}
  <span class="post-meta-item">
    <span class="post-meta-label">Reading time:</span>
    {{ .ReadingTime }} min
  </span>
</div>
