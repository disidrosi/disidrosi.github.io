<link rel="canonical" href="{{ .Permalink }}" />
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

{{ $styles := resources.Get "css/main.scss" | css.Sass | minify | fingerprint }}
<link rel="stylesheet" href="{{ $styles.RelPermalink }}" />

{{ if .Params.math }}
  {{ $kv := .Site.Params.katexVersion }}
  <link
    rel="preload"
    as="style"
    href="https://cdn.jsdelivr.net/npm/katex@{{ $kv }}/dist/katex.min.css"
    integrity="sha384-irXK0JiCGinqGL+slwVklbhJetrjczNwaP2lANewD8lKAs9n61SbQ3As28iSqXUE"
    crossorigin="anonymous"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@{{ $kv }}/dist/katex.min.css"
      integrity="sha384-irXK0JiCGinqGL+slwVklbhJetrjczNwaP2lANewD8lKAs9n61SbQ3As28iSqXUE"
      crossorigin="anonymous"
    />
  </noscript>
{{ end }}
