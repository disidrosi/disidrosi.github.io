{{ if eq .Type "alert" }}
  <div class="callout callout-{{ .AlertType }}">
    <div class="callout-title">
      {{ with .AlertTitle }}
        {{ . }}
      {{ else }}
        {{ title .AlertType }}
      {{ end }}
    </div>
    <div class="callout-content">
      {{ .Text }}
    </div>
  </div>
{{ else }}
  <blockquote>
    {{ .Text }}
  </blockquote>
{{ end }}
